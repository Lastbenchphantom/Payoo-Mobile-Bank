<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo MFS - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main class="flex justify-center py-8">
      <div class="mockup-phone">
        <div class="mockup-phone-camera"></div>
        <div
          class="mockup-phone-display text-white grid place-content-center bg-neutral-900 p-6"
        >
          <div class="flex justify-center mt-4">
            <div class="stats shadow">
              <div class="stat bg-white text-black text-center min-w-[200px]">
                <div id="balance" class="stat-value text-3xl">89400</div>
                <div class="stat-desc text-black opacity-70 font-medium">
                  Available Balance (BDT)
                </div>
              </div>
            </div>
          </div>

          <div class="divider divider-neutral"></div>

          <div class="flex gap-4 justify-center">
            <button id="addmoney-btn" class="btn btn-md btn-active">
              Add Money
            </button>
            <button id="cashout-btn" class="btn btn-md">Cash Out</button>
          </div>

          <div class="divider divider-neutral"></div>

          <div
            id="addmoney-form"
            class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl"
          >
            <div class="card-body p-6">
              <form id="form-add-money" class="fieldset text-black">
                <label class="label font-semibold">Amount to Add</label>
                <input
                  id="amount"
                  type="number"
                  class="input input-bordered w-full"
                  placeholder="Amount"
                  autocomplete="off"
                  required
                />

                <label class="label font-semibold mt-2">PIN</label>
                <input
                  id="pin"
                  type="password"
                  class="input input-bordered w-full"
                  placeholder="4-6 Digit PIN"
                  autocomplete="off"
                  required
                />

                <button type="submit" class="btn btn-neutral mt-6 w-full">
                  Add Money
                </button>
              </form>
            </div>
          </div>

          <div
            id="cashout-form"
            class="hidden card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl"
          >
            <div class="card-body p-6">
              <form id="form-withdraw" class="fieldset text-black">
                <label class="label font-semibold">Amount to Withdraw</label>
                <input
                  id="withdraw-amount"
                  type="number"
                  class="input input-bordered w-full"
                  placeholder="Amount"
                  autocomplete="off"
                  required
                />

                <label class="label font-semibold mt-2">PIN</label>
                <input
                  id="withdraw-pin"
                  type="password"
                  class="input input-bordered w-full"
                  placeholder="4-6 Digit PIN"
                  autocomplete="off"
                  required
                />

                <button type="submit" class="btn btn-neutral mt-6 w-full">
                  Cash Out
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="./js/utilities.js"></script>
    <script src="./js/features.js"></script>
    <script src="./js/home.js"></script>
  </body>
</html>
