<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo MFS</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main class="flex justify-center">
      <div class="mockup-phone">
        <div class="mockup-phone-camera"></div>
        <div
          class="mockup-phone-display text-white grid place-content-center bg-neutral-900"
        >
          <!-- Available Balance -->
          <div class="flex justify-center">
            <div class="stats shadow">
              <div class="stat bg-white text-black">
                <div id="balance" class="stat-value">89400</div>
                <div class="stat-desc text-black opacity-70">
                  Available Balance
                </div>
              </div>
            </div>
          </div>
          <div class="divider divider-neutral"></div>

          <!-- user action buttons -->

          <div>
            <button class="btn btn-lg">Add Money</button>
            <button class="btn btn-lg">Cash Out</button>
          </div>
          <div class="divider divider-neutral"></div>
          <!-- add money form start -->
          <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
            <div class="card-body">
              <form class="fieldset text-black">
                <label class="label">Amount to Add</label>
                <input id="amount"
                  type="text"
                  class="input"
                  placeholder="Amount"
                  autocomplete="off"
                  required
                />
                <label class="label">Password</label>
                <input id="pin"
                  type="password"
                  class="input"
                  placeholder="Password"
                  autocomplete="off"
                  required
                />
                <button id="btn-add-money" class="btn btn-neutral mt-4">
                  Add Money
                </button>
              </form>
            </div>
          </div>
          <!-- add money form end -->
        </div>
      </div>
    </main>
    <script src="/js/home.js"></script>
  </body>
</html>
