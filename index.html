<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo MFS - Login</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  </head>
  <body class="bg-neutral-950 min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-sm">
      
      <div class="mockup-phone border-neutral-800 shadow-2xl">
        <div class="mockup-phone-camera"></div>
        <div class="mockup-phone-display bg-neutral-900 text-neutral-200 p-6 pt-12">
          
          <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">Payoo MFS</h1>
            <p class="text-sm text-neutral-400 px-4">
              Securely access your mobile financial services dashboard.
            </p>
          </div>

          <div class="card bg-neutral-950/50 border border-neutral-800 rounded-2xl shadow-xl">
            <form class="card-body p-6" action="#" method="POST">
              
              <div class="form-control mb-4">
                <label for="phone-number" class="label label-text font-medium text-neutral-300 pb-1">
                  Phone Number
                </label>
                <input
                  id="phone-number"
                  type="tel"
                  class="input input-bordered input-md w-full bg-neutral-900 text-white focus:input-primary"
                  placeholder="+8801*********"
                  autocomplete="tel"
                  required
                />
              </div>

              <div class="form-control mb-2">
                <label for="pin-number" class="label label-text font-medium text-neutral-300 pb-1">
                  4-Digit PIN
                </label>
                <input
                  id="pin-number"
                  type="password"
                  class="input input-bordered input-md w-full bg-neutral-900 text-white focus:input-primary"
                  placeholder="••••"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  autocomplete="current-password"
                  required
                />
              </div>

              <div class="text-right mb-6">
                <a href="#" class="link link-hover text-xs text-neutral-400 hover:text-primary transition-colors">
                  Forgot PIN?
                </a>
              </div>

              <button
                id="btn-login"
                type="submit"
                class="btn btn-primary w-full shadow-lg"
              >
                Login
              </button>
              
            </form>
          </div>
          
        </div>
      </div>
      
    </main>
    
    <script src="./js/utilities.js"></script>
    <script src="./js/login.js"></script>
  </body>
</html>
