<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo MFS</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main class="flex justify-center">
      <div class="mockup-phone">
        <div class="mockup-phone-camera"></div>
        <div
          class="mockup-phone-display text-white grid place-content-center bg-neutral-900"
        >
          <div class="hero min-h-screen">
            <div class="hero-content flex-col">
              <div class="text-center lg:text-center">
                <h1 class="text-5xl font-bold">Login now!</h1>
                <p class="py-6">
                  Provident cupiditate voluptatem et in. Quaerat fugiat ut
                  assumenda excepturi exercitationem quasi.
                </p>
              </div>

              <div class="card w-full max-w-sm shrink-0 shadow-2xl">
                <form
                  class="card-body bg-black rounded-2xl"
                  action="#"
                  method="POST"
                >
                  <fieldset class="fieldset">
                    <label class="label">Phone Number</label>
                    <input
                      id="phone-number"
                      type="text"
                      class="input text-black"
                      placeholder="+8801*********"
                      autocomplete="username"
                      required
                    />

                    <label class="label">Pin</label>
                    <input
                      id="pin-number"
                      type="password"
                      class="input text-black"
                      placeholder="******"
                      autocomplete="current-password"
                      required
                    />

                    <div class="mt-2">
                      <a class="link link-hover text-sm text-gray-400"
                        >Forgot password?</a
                      >
                    </div>
                    <button
                      id="btn-login"
                      type="submit"
                      class="btn btn-neutral mt-4 w-full"
                    >
                      Login
                    </button>
                  </fieldset>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="/js/login.js"></script>
  </body>
</html>
